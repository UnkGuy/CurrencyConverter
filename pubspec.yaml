name: currencyconverter
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # --- The Camera & Vision ---
  camera: ^0.10.5+9
  google_mlkit_text_recognition: ^0.13.0

  # --- The Networking & Data ---
  http: ^1.2.0

  # --- The Offline Storage & Permissions ---
  shared_preferences: ^2.2.3
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1 # The icon generator package!

flutter:
  uses-material-design: true

# --- APP ICON CONFIGURATION ---
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21